<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abalon</title>
  <meta name="description" content="Abalon is developing a technology platform connecting homeowners with verified contractors across the United States." />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #f8f8f8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 600px;
      width: 90%;
    }
    h1 {
      margin-top: 0;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      background: black;
      color: white;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Abalon</h1>
    <p><strong>Building the future of home services.</strong></p>
    <p>
      Abalon is developing a technology platform connecting homeowners with verified contractors across the United States.
    </p>
    <a class="btn" href="mailto:info@abalon.app">Contact us</a>
  </div>
</body>
</html>
